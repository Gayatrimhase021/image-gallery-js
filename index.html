<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        .main-img{
            height: 200px;
            width: 300px;
            margin: 10px;
            border-radius: 10px;
        }
        .gallery-container{
            width: fit-content;
            margin: 10px auto;
            display: flex;
            align-items: center;
        }
        .btn-slide{
            display: flex;
            height: 30px;
            width: 30px;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border: 1px solid black;
        }
        .preview-image{
            height: 40px ;
            margin: 0 5px;
        }
        .gallery-preview{
            display: flex;
            overflow: scroll;
            width: 60%;
            margin: auto;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="gallery-container">
        <span class="btn-slide btn-left" onclick="slideLeft()">&lt;</span>

        <img class="main-img"
        src="https://images.unsplash.com/photo-1474511320723-9a56873867b5"
        alt="image 1"
        id="mainImage"
        />

        <span class="btn-slide btn-right" onclick="slideRight()">&gt;</span>
    </div>

    <div class="gallery-preview" id="gallery-preview"></div>

    <script>
       
       

        let currentIndex = 0;

        function showCurrentIndexImage() {
            const imgElement = document.getElementById("mainImage");
            imgElement.src = IMAGES[currentIndex].url; // ✅ fix
        }

        function slideLeft() {
            if(currentIndex > 0){
                currentIndex--;
            } else {const IMAGES = [
    {
        url: "https://images.unsplash.com/photo-1474511320723-9a56873867b5",
        title: "Tiger in the world",
        description: "Wild animal"
    },
    {
        url: "https://images.unsplash.com/photo-1502082553048-f009c37129b9",
        title: "Forest view",
        description: "Nature scene"
    },
    {
        url: "https://images.unsplash.com/photo-1501706362039-c6e80948bb1a",
        title: "Mountain",
        description: "Beautiful mountain"
    },
    {
       
        url: "https://images.unsplash.com/photo-1518717758536-85ae29035b6d",
        title: "Dog",
        description: "Cute dog"
    },

   
    {
        url: "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
        title: "River",
        description: "Flowing river"
    },
    {
        url: "https://images.unsplash.com/photo-1493244040629-496f6d136cc3",
        title: "Beach",
        description: "Relaxing beach"
    },
    {
        url: "https://images.unsplash.com/photo-1518837695005-2083093ee35b",
        title: "Bird",
        description: "Flying bird"
    },
    {
        url: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
        title: "Sunset",
        description: "Evening sunset"
    }
];
                currentIndex = IMAGES.length - 1;
            }
            showCurrentIndexImage();
        }

        function slideRight(){
            if(currentIndex < IMAGES.length - 1){
                currentIndex++;
            } else {
                currentIndex = 0;
            }
            showCurrentIndexImage();
        }

        function showImage(index){
            currentIndex = index;
            showCurrentIndexImage();
        }

        function createGalleryPreview(){
            const galleryPreviewContainer = document.getElementById("gallery-preview");
            galleryPreviewContainer.innerHTML = "";

            for(let i = 0; i < IMAGES.length; i++){
                galleryPreviewContainer.innerHTML += 
                `<img src='${IMAGES[i].url}' class='preview-image' onclick='showImage(${i})'/>`;
            }
        }

        
        createGalleryPreview();
        showCurrentIndexImage();
    </script>

</body>
</html>
